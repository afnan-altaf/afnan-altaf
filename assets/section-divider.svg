<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="60" viewBox="0 0 1200 60">
  <defs>
    <style>
      @keyframes scanline2 {
        0% { transform: translateX(-200px); }
        100% { transform: translateX(1400px); }
      }
      @keyframes blink2 {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .hscan { animation: scanline2 8s linear infinite; }
      .hdot { animation: blink2 2s ease-in-out infinite; }
    </style>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="20%">
        <animate attributeName="stop-color" values="#0d0117;#0a1628;#0d0117" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#0a0020;#0d0221;#0a0020" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%">
        <animate attributeName="stop-color" values="#0a1628;#0d0117;#0a1628" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="30%" stop-color="#6366f188"/>
      <stop offset="50%" stop-color="#818cf8ff"/>
      <stop offset="70%" stop-color="#6366f188"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="60" fill="url(#divGrad)"/>

  <!-- Moving horizontal light streak -->
  <rect class="hscan" x="0" y="0" width="200" height="60" fill="url(#lineGlow)" opacity="0.4"/>

  <!-- Grid micro-lines -->
  <g stroke="#6366f1" stroke-width="0.3" opacity="0.15">
    <line x1="0" y1="20" x2="1200" y2="20"/>
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="200" y1="0" x2="200" y2="60"/>
    <line x1="400" y1="0" x2="400" y2="60"/>
    <line x1="600" y1="0" x2="600" y2="60"/>
    <line x1="800" y1="0" x2="800" y2="60"/>
    <line x1="1000" y1="0" x2="1000" y2="60"/>
  </g>

  <!-- Top border glow -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#6366f1" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </line>
  <!-- Bottom border glow -->
  <line x1="0" y1="59" x2="1200" y2="59" stroke="#6366f1" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Dots pattern -->
  <circle cx="20" cy="30" r="2" fill="#6366f1" class="hdot" filter="url(#glow2)" style="animation-delay:0s"/>
  <circle cx="60" cy="30" r="1.5" fill="#818cf8" class="hdot" filter="url(#glow2)" style="animation-delay:0.3s"/>
  <circle cx="100" cy="30" r="2" fill="#6366f1" class="hdot" filter="url(#glow2)" style="animation-delay:0.6s"/>
  <circle cx="1100" cy="30" r="2" fill="#6366f1" class="hdot" filter="url(#glow2)" style="animation-delay:0.1s"/>
  <circle cx="1140" cy="30" r="1.5" fill="#818cf8" class="hdot" filter="url(#glow2)" style="animation-delay:0.4s"/>
  <circle cx="1180" cy="30" r="2" fill="#6366f1" class="hdot" filter="url(#glow2)" style="animation-delay:0.7s"/>
</svg>
