<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <style>
      @keyframes scanline {
        0% { transform: translateY(-320px); }
        100% { transform: translateY(320px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes drift {
        0%, 100% { transform: translateY(0px) translateX(0px); }
        25% { transform: translateY(-8px) translateX(4px); }
        50% { transform: translateY(-4px) translateX(-6px); }
        75% { transform: translateY(6px) translateX(3px); }
      }
      @keyframes flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.8; }
        97% { opacity: 1; }
        98% { opacity: 0.6; }
      }
      @keyframes gradientPulse {
        0% { stop-color: #0d0117; }
        33% { stop-color: #0a1628; }
        66% { stop-color: #130a1e; }
        100% { stop-color: #0d0117; }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 8px #6366f1); }
        50% { filter: drop-shadow(0 0 20px #818cf8) drop-shadow(0 0 40px #6366f1); }
      }
      .glow-text { animation: glowPulse 3s ease-in-out infinite, flicker 8s linear infinite; }
      .particle { animation: drift 6s ease-in-out infinite; }
      .blink { animation: pulse 2s ease-in-out infinite; }
      .scan { animation: scanline 6s linear infinite; }
    </style>

    <!-- Main dark gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#000000;#0d0117;#070010;#000000" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="35%">
        <animate attributeName="stop-color" values="#0a0020;#0d0221;#080018;#0a0020" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="65%">
        <animate attributeName="stop-color" values="#001020;#0a1628;#000d18;#001020" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#000000;#050010;#000000;#000000" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Radial glow behind text -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#6366f122;#818cf833;#6366f122" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00000000"/>
    </radialGradient>

    <!-- Scanline gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f100"/>
      <stop offset="50%" stop-color="#818cf815"/>
      <stop offset="100%" stop-color="#6366f100"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle particle glow -->
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- Center radial glow -->
  <rect width="1200" height="320" fill="url(#centerGlow)"/>

  <!-- Grid lines - horizontal -->
  <g stroke="#6366f1" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
  </g>

  <!-- Grid lines - vertical -->
  <g stroke="#6366f1" stroke-width="0.4" opacity="0.10">
    <line x1="80" y1="0" x2="80" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="560" y1="0" x2="560" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="880" y1="0" x2="880" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1040" y1="0" x2="1040" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- Moving scanline -->
  <rect class="scan" x="0" y="0" width="1200" height="60" fill="url(#scanGrad)" opacity="0.6"/>

  <!-- Floating particles - LEFT side -->
  <g class="particle" style="animation-delay: 0s;">
    <circle cx="60" cy="50" r="2.5" fill="#818cf8" opacity="0.7" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 0.8s;">
    <circle cx="150" cy="110" r="1.8" fill="#6366f1" opacity="0.5" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 1.5s;">
    <circle cx="40" cy="200" r="3" fill="#a5b4fc" opacity="0.4" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 2.2s;">
    <circle cx="200" cy="270" r="1.5" fill="#818cf8" opacity="0.6" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 0.3s;">
    <circle cx="110" cy="160" r="2" fill="#c4b5fd" opacity="0.5" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles - CENTER -->
  <g class="particle" style="animation-delay: 1.0s;">
    <circle cx="550" cy="30" r="2" fill="#818cf8" opacity="0.4" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 2.8s;">
    <circle cx="620" cy="290" r="1.5" fill="#6366f1" opacity="0.6" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 0.5s;">
    <circle cx="480" cy="250" r="2.5" fill="#a5b4fc" opacity="0.3" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles - RIGHT side -->
  <g class="particle" style="animation-delay: 1.2s;">
    <circle cx="1100" cy="60" r="2.5" fill="#818cf8" opacity="0.6" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 0.6s;">
    <circle cx="1020" cy="150" r="1.8" fill="#6366f1" opacity="0.5" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 1.9s;">
    <circle cx="1150" cy="230" r="3" fill="#a5b4fc" opacity="0.4" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 0.9s;">
    <circle cx="950" cy="290" r="2" fill="#c4b5fd" opacity="0.5" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g class="particle" style="animation-delay: 2.5s;">
    <circle cx="870" cy="80" r="1.5" fill="#818cf8" opacity="0.7" filter="url(#particleGlow)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner decorations - top left -->
  <g opacity="0.6">
    <line x1="20" y1="15" x2="70" y2="15" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="15" x2="20" y2="50" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Corner decorations - top right -->
  <g opacity="0.6">
    <line x1="1130" y1="15" x2="1180" y2="15" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="1180" y1="15" x2="1180" y2="50" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Corner decorations - bottom left -->
  <g opacity="0.6">
    <line x1="20" y1="305" x2="70" y2="305" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="270" x2="20" y2="305" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Corner decorations - bottom right -->
  <g opacity="0.6">
    <line x1="1130" y1="305" x2="1180" y2="305" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="1180" y1="270" x2="1180" y2="305" stroke="#6366f1" stroke-width="1.5">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Decorative horizontal accent lines -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#6366f1" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Side accent lines -->
  <line x1="1" y1="0" x2="1" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="1199" y1="0" x2="1199" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

  <!-- MAIN TITLE -->
  <text x="600" y="148"
    font-family="'Courier New', Courier, monospace"
    font-size="72" font-weight="900"
    fill="white"
    text-anchor="middle"
    filter="url(#textGlow)"
    letter-spacing="8"
    class="glow-text">
    AFNAN JAMBER
    <animate attributeName="fill" values="white;#e0e7ff;white" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative line under title -->
  <rect x="280" y="162" width="640" height="1.5" rx="1" fill="#6366f1" opacity="0.8">
    <animate attributeName="width" values="640;540;640" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="280;330;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- SUBTITLE -->
  <text x="600" y="200"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="400"
    fill="#818cf8"
    text-anchor="middle"
    letter-spacing="2">
    ⚡  Founder @ JamberTech  |  Full-Stack Developer  |  Automation Architect
    <animate attributeName="opacity" values="1;0.7;1" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- BOTTOM STATUS LINE -->
  <text x="600" y="248"
    font-family="'Courier New', Courier, monospace"
    font-size="13" font-weight="400"
    fill="#475569"
    text-anchor="middle"
    letter-spacing="1">
    root@jambertech:~$ ./build --product --automate --ship 🚀
    <animate attributeName="fill" values="#475569;#6366f1;#475569" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Cursor blink after the text -->
  <rect x="952" y="236" width="10" height="16" rx="1" fill="#818cf8" class="blink"/>

  <!-- Horizontal decorative lines around subtitle -->
  <line x1="80" y1="175" x2="340" y2="175" stroke="#6366f1" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="860" y1="175" x2="1120" y2="175" stroke="#6366f1" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Diamond accents -->
  <polygon points="360,175 366,169 372,175 366,181" fill="#6366f1" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="828,175 834,169 840,175 834,181" fill="#6366f1" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </polygon>
</svg>
